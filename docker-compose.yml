version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: railway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "YHVsDPHTmsbICDpxwwMxrJYVCJjQxCRG"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/railway
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: YHVsDPHTmsbICDpxwwMxrJYVCJjQxCRG
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_ADDRESS: "0.0.0.0"  # Для IPv4/IPv6
      PORT: "8080"

volumes:
  postgres_data: