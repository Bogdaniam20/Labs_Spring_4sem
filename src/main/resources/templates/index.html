<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4e73df;
            --secondary: #858796;
            --success: #1cc88a;
            --danger: #e74a3b;
            --warning: #f6c23e;
            --light: #f8f9fc;
        }

        body {
            background-color: #f8f9fc;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .card {
            border: none;
            border-radius: 0.35rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        .card-header {
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
            padding: 1rem 1.35rem;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .table {
            margin-bottom: 0;
        }

        .table th {
            border-top: none;
            font-weight: 600;
            color: var(--secondary);
            padding: 1rem;
            background-color: #f8f9fc;
        }

        .table td {
            padding: 1rem;
            vertical-align: middle;
        }

        .btn {
            border-radius: 0.35rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
        }

        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        .spinner-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            border: 0.25em solid rgba(78, 115, 223, 0.2);
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            border-radius: 50%;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1100;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="m-0 font-weight-bold text-primary">Список пользователей</h5>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                        <i class="fas fa-plus me-2"></i>Добавить
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="userTable">
                            <thead>
                            <tr>
                                <th width="5%">ID</th>
                                <th width="20%">Пользователь</th>
                                <th width="20%">Имя</th>
                                <th width="20%">Фамилия</th>
                                <th width="15%">Статус</th>
                                <th width="20%">Действия</th>
                            </tr>
                            </thead>
                            <tbody id="userTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Добавить пользователя</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="surname" class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="surname" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button type="button" class="btn btn-primary" onclick="addUser()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Редактировать пользователя</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label for="editName" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editSurname" class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="editSurname" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button type="button" class="btn btn-primary" onclick="updateUser()">Обновить</button>
            </div>
        </div>
    </div>
</div>

<div id="loading" class="spinner-container" style="display: none;">
    <div class="spinner"></div>
</div>

<div class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let usersData = [];

    async function loadUsers() {
        showLoading(true);

        try {
            const response = await fetch('http://localhost:8080/users/getAll');
            usersData = await response.json();
            renderUsersTable();
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            showToast('Ошибка при загрузке данных', 'danger');
        } finally {
            showLoading(false);
        }
    }

    function renderUsersTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';

        if (usersData.length === 0) {
            tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">
                            <i class="fas fa-users-slash fa-2x mb-3"></i>
                            <p>Нет данных для отображения</p>
                        </td>
                    </tr>
                `;
            return;
        }

        usersData.forEach(user => {
            const initials = (user.name.charAt(0) + user.surname.charAt(0)).toUpperCase();
            const row = document.createElement('tr');
            row.innerHTML = `
                    <td>${user.id}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-3">${initials}</div>
                            <div>${user.name} ${user.surname}</div>
                        </div>
                    </td>
                    <td>${user.name}</td>
                    <td>${user.surname}</td>
                    <td>
                        <span class="badge bg-success">Активен</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-warning me-2" onclick="openEditModal(${user.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="confirmDelete(${user.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
            tbody.appendChild(row);
        });
    }

    function openEditModal(id) {
        const user = usersData.find(u => u.id === id);
        if (user) {
            document.getElementById('editId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editSurname').value = user.surname;

            const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
            modal.show();
        }
    }

    async function addUser() {
        const name = document.getElementById('name').value.trim();
        const surname = document.getElementById('surname').value.trim();

        if (!name || !surname) {
            showToast('Заполните все поля', 'warning');
            return;
        }

        showLoading(true);

        try {
            const response = await fetch('http://localhost:8080/users/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name, surname })
            });

            if (response.ok) {
                const newUser = await response.json();
                usersData.push(newUser);
                renderUsersTable();

                const modal = bootstrap.Modal.getInstance(document.getElementById('addUserModal'));
                modal.hide();
                document.getElementById('addUserForm').reset();

                showToast('Пользователь успешно добавлен', 'success');
            } else {
                const error = await response.json();
                showToast(error.message || 'Ошибка при добавлении', 'danger');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showToast('Ошибка сети', 'danger');
        } finally {
            showLoading(false);
        }
    }

    async function updateUser() {
        const id = parseInt(document.getElementById('editId').value);
        const name = document.getElementById('editName').value.trim();
        const surname = document.getElementById('editSurname').value.trim();

        if (!name || !surname) {
            showToast('Заполните все поля', 'warning');
            return;
        }

        showLoading(true);

        try {
            const response = await fetch('http://localhost:8080/users/update', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ id, name, surname })
            });

            if (response.ok) {
                const updatedUser = await response.json();

                const index = usersData.findIndex(u => u.id === id);
                if (index !== -1) {
                    usersData[index] = updatedUser;
                }

                renderUsersTable();

                const modal = bootstrap.Modal.getInstance(document.getElementById('editUserModal'));
                modal.hide();

                showToast('Данные обновлены', 'success');
            } else {
                const error = await response.json();
                showToast(error.message || 'Ошибка при обновлении', 'danger');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showToast('Ошибка сети', 'danger');
        } finally {
            showLoading(false);
        }
    }

    function confirmDelete(id) {
        if (confirm('Вы уверены, что хотите удалить этого пользователя?')) {
            deleteUser(id);
        }
    }

    async function deleteUser(id) {
        showLoading(true);

        try {
            const response = await fetch(`http://localhost:8080/users/deleteById/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                usersData = usersData.filter(user => user.id !== id);
                renderUsersTable();
                showToast('Пользователь удален', 'success');
            } else {
                const error = await response.json();
                showToast(error.message || 'Ошибка при удалении', 'danger');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showToast('Ошибка сети', 'danger');
        } finally {
            showLoading(false);
        }
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    function showToast(message, type) {
        const toastContainer = document.querySelector('.toast-container');
        const toastEl = document.createElement('div');
        toastEl.className = `toast show align-items-center text-white bg-${type} border-0`;
        toastEl.role = 'alert';
        toastEl.setAttribute('aria-live', 'assertive');
        toastEl.setAttribute('aria-atomic', 'true');

        toastEl.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            `;

        toastContainer.appendChild(toastEl);

        setTimeout(() => {
            const bsToast = new bootstrap.Toast(toastEl);
            bsToast.hide();
            toastEl.addEventListener('hidden.bs.toast', () => {
                toastEl.remove();
            });
        }, 5000);
    }

    document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
